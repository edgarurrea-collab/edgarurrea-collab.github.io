<!DOCTYPE html>
<!--Este es el encabezado y los aplicativos de CSS-->
<head lang="es"> <!--Etiqueta "head" que contiene la información de la pagina-->
    <meta charset="UTF-8"> <!--Define el tipo de codificación de caracteres-->
    <title>Pagina de inicio</title>
<!--Este "Style" define los parametros de css que usare-->
    <style>
        .fondo{
            background-image: url('Recursos 1/fondo.png');
            background-repeat: no-repeat;
            background-size: cover;
            
        }
        .contenedor {
            text-align: center; /* Centra el texto */
            position: center;
            width: 100%; /* Ancho del contenedor */
        }
        .texto {
            top: 50px;              /* vertical: centro */
            left: 50%;             /* horizontal: centro */
            position: absolute;
            transform: translate(-50%, -50%); /* ajusta al centro exacto */
            color: white;
            font-size: 11px;
            font-weight: bold; /* negrita */
            text-shadow: 2px 2px 5px black;  /* para que se lea mejor */
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        .contenido {
            position: absolute;
            top: 47%;              /* vertical: centro */
            left: 50%;             /* horizontal: centro */
            transform: translate(-50%, -50%); /* ajusta al centro exacto */
            color: white;
            font-size: 18px;
            font-weight: bold; /* negrita */
            text-shadow: 2px 2px 5px black;  /* para que se lea mejor */
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
    </style>
</head>

<!--Estos son los botones para interactuar-->
<body>
    <!--El siguiente estilo css permite animar los botones-->
    <style>
        @keyframes pulso-img {
        0% {
            transform: scale(1);
        }
        25% {
            transform: scale(1.022); /* pulso leve */
        }
        50% {
            transform: scale(1); /* pulso leve */
        }
        75% {
            transform: scale(1.022); /* pulso leve */
        }
        100% {
            transform: scale(1);
        }
        
        }
        @keyframes pulso-text {
        0% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.04); /* pulso leve */
        }
        100% {
            transform: scale(1);
        }
        
        }
        .pulso-imagen{
        transition: transform 0.8s ease;
        translate: 0; /* Asegura que la imagen o texto no se mueva al hacer hover */
        }

        .pulso-imagen:hover {
        animation: pulso-img 0.8s ease;
        }
        .pulso-texto{
        transition: transform 0.8s ease;
        translate: 0; /* Asegura que la imagen o texto no se mueva al hacer hover */
        }

        .pulso-texto:hover {
        animation: pulso-text 0.8s ease;
        }
    /* Las siguientes etiquetas de css permiten ajustar la posicion de los botones*/

            transform: translate(-50%, -50%);
            top: 470px; /* Ajusta la posición vertical */
            left: 50%; /* Ajusta la posición horizontal */
        }
    </style>
