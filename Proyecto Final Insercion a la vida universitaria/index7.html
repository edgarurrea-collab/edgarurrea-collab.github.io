<!--Estos son los botones para interactuar-->
<body>
    <!--El siguiente estilo css permite animar los botones-->
    <style>
        @keyframes pulso-img {
        0% {
            transform: scale(1);
        }
        25% {
            transform: scale(1.022); /* pulso leve */
        }
        50% {
            transform: scale(1); /* pulso leve */
        }
        75% {
            transform: scale(1.022); /* pulso leve */
        }
        100% {
            transform: scale(1);
        }
        
        }
        @keyframes pulso-text {
        0% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.04); /* pulso leve */
        }
        100% {
            transform: scale(1);
        }
        
        }
        .pulso-imagen{
        transition: transform 0.8s ease;
        translate: 0; /* Asegura que la imagen o texto no se mueva al hacer hover */
        }

        .pulso-imagen:hover {
        animation: pulso-img 0.8s ease;
        }
        .pulso-texto{
        transition: transform 0.8s ease;
        translate: 0; /* Asegura que la imagen o texto no se mueva al hacer hover */
        }

        .pulso-texto:hover {
        animation: pulso-text 0.8s ease;
        }
